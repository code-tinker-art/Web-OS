<div class="sh-root">
    <div class="sh-titlebar" data-drag>
        <div class="sh-titlebar-left">
            <div class="sh-btn sh-btn-close"></div>
            <div class="sh-btn sh-btn-min"></div>
            <div class="sh-btn sh-btn-max"></div>
        </div>
        <div class="sh-titlebar-title">WebOS Shell</div>
        <div class="sh-titlebar-right"></div>
    </div>

    <div class="sh-body" id="sh-body">
        <div class="sh-output" id="sh-output"></div>
        <div class="sh-input-row" id="sh-input-row">
            <span class="sh-prompt" id="sh-prompt">user@webos:~$</span>
            <input class="sh-input" id="sh-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
        </div>
    </div>
</div>
