<div class="fp-root">

    <!-- Titlebar -->
    <div class="fp-titlebar" data-drag>
        <div class="fp-titlebar-left">
            <div class="fp-btn fp-btn-close"></div>
            <div class="fp-btn fp-btn-min"></div>
            <div class="fp-btn fp-btn-max"></div>
        </div>
        <div class="fp-titlebar-center">Filepad</div>
        <div class="fp-titlebar-right"></div>
    </div>

    <!-- Main layout: activity bar | sidebar | editor -->
    <div class="fp-layout">

        <!-- Activity bar (icon rail on far left, like VS Code) -->
        <div class="fp-activity-bar">
            <button class="fp-activity-btn active" id="fp-act-explorer" title="Explorer">
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                    <path d="M4 4h6l2 2h6v12H4V4z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" />
                    <path d="M4 9h14" stroke="currentColor" stroke-width="1.3" />
                </svg>
            </button>
            <button class="fp-activity-btn" id="fp-act-new" title="New File (Ctrl+N)">
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                    <path d="M5 3h8l4 4v12H5V3z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" />
                    <path d="M13 3v4h4" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" />
                    <path d="M9 12v5M6.5 14.5h5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
                </svg>
            </button>
            <button class="fp-activity-btn" id="fp-act-save" title="Save (Ctrl+S)">
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                    <path d="M4 3h11l3 3v13H4V3z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" />
                    <path d="M7 3v5h8V3" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" />
                    <rect x="6" y="13" width="10" height="6" rx="0.5" stroke="currentColor" stroke-width="1.3" />
                </svg>
            </button>
        </div>

        <!-- Sidebar (explorer panel) -->
        <div class="fp-sidebar" id="fp-sidebar">
            <div class="fp-sidebar-title">
                <span id="fp-sidebar-folder-name">NO FOLDER OPENED</span>
                <div class="fp-sidebar-actions">
                    <button class="fp-sidebar-action-btn" id="fp-sidebar-refresh" title="Refresh">↻</button>
                    <button class="fp-sidebar-action-btn" id="fp-sidebar-close-folder" title="Close Folder">✕</button>
                </div>
            </div>
            <div id="fp-sidebar-body">
                <!-- Either the "open folder" prompt or the tree -->
            </div>
        </div>

        <!-- Editor column: tabs + body -->
        <div class="fp-editor-col">
            <div class="fp-tab-bar" id="fp-tab-bar"></div>
            <div class="fp-body" id="fp-body"></div>
        </div>

    </div>

    <!-- Statusbar -->
    <div class="fp-statusbar">
        <span id="fp-status-text">Ready</span>
        <span id="fp-status-type"></span>
    </div>

    <!-- Save-as modal -->
    <div class="fp-modal hidden" id="fp-save-modal">
        <div class="fp-modal-box">
            <div class="fp-modal-title">Save File</div>
            <label class="fp-modal-label">Directory (blank = root)</label>
            <input class="fp-modal-input" id="fp-save-dir" placeholder="e.g. Documents" autocomplete="off" spellcheck="false" />
            <label class="fp-modal-label">Filename</label>
            <input class="fp-modal-input" id="fp-save-name" placeholder="e.g. notes.txt" autocomplete="off" spellcheck="false" />
            <div class="fp-modal-err" id="fp-save-err"></div>
            <div class="fp-modal-row">
                <button class="fp-modal-btn secondary" id="fp-save-cancel">Cancel</button>
                <button class="fp-modal-btn primary" id="fp-save-confirm">Save</button>
            </div>
        </div>
    </div>

    <!-- Unsaved-changes warning modal -->
    <div class="fp-modal hidden" id="fp-warn-modal">
        <div class="fp-modal-box">
            <div class="fp-modal-title">Unsaved Changes</div>
            <div class="fp-modal-sub" id="fp-warn-sub">Save changes before closing?</div>
            <div class="fp-modal-row">
                <button class="fp-modal-btn secondary" id="fp-warn-cancel">Cancel</button>
                <button class="fp-modal-btn danger" id="fp-warn-discard">Don't Save</button>
                <button class="fp-modal-btn primary" id="fp-warn-save">Save &amp; Close</button>
            </div>
        </div>
    </div>

</div>
